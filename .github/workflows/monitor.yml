name: MACD Monitor

on:
  schedule:
    # 每5分钟运行一次
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # 超时保护，避免卡死

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python run_monitor.py

      - name: Commit results
        run: |
          git config user.name "MACD Monitor Bot"
          git config user.email "bot@monitor.com"
          git add data/signals.json data/last_run.txt || true
          git diff --staged --quiet || git commit -m "Update signals $(date -u '+%H:%M UTC')"
          git push || true
